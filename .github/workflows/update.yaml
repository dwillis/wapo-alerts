name: Update alerts
on:
  push:
    push:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Check out this repo"
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ensure browsers are installed
        run: uv run python -m playwright install --with-deps

      - name: Run script
        run: uv run python get_alerts.py

      - name: Run csv
        run: uv run python make_csv.py

      - name: Run RSS
        run: uv run python make_rss.py

      - name: Run analysis
        run: uv run python analyze_alerts.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Sync alerts.json to site directory
        run: cp alerts.json site/alerts.json

      - name: "Commit and push if it changed"
        run: |-
            git config user.name "Automated"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            timestamp=$(date -u)
            git commit -m "Latest data: ${timestamp}" || exit 0
            git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy data to GitHub Pages
        uses: actions/deploy-pages@v4
